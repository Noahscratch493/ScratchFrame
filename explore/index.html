<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScratchFrame Explore Embed</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Poppins',sans-serif; background:#121212; color:#fff; }
.header { font-size:24px; font-weight:600; text-align:center; padding:20px; }
.projects { display:flex; gap:20px; overflow-x:auto; padding:20px; }
.project { width:180px; cursor:pointer; text-align:center; }
.project img { width:100%; border-radius:10px; transition:transform 0.2s; }
.project img:hover { transform:scale(1.05); }
.project-name { margin-top:6px; font-size:14px; font-weight:500; }
.creator { display:flex; align-items:center; gap:8px; margin-top:4px; justify-content:center; font-size:13px; color:#ccc; }
.creator img { width:24px; height:24px; border-radius:50%; cursor:pointer; }

/* Overlay */
.action-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:1000; }
.action-content { display:flex; gap:50px; align-items:center; margin-bottom:30px; flex-wrap:wrap; justify-content:center; }
.logo { display:flex; flex-direction:column; align-items:center; gap:10px; }
.logo img, .logo svg { width:60px; height:60px; }
.logo button { background:none; border:none; color:#fff; cursor:pointer; font-size:16px; padding:6px 12px; transition:color 0.3s; }
.logo button:hover { color:#1d70b8; }

.cancel-btn { background:#1d70b8; border:none; color:#fff; font-size:16px; padding:10px 20px; border-radius:8px; cursor:pointer; }
.cancel-btn:hover { background:#155a8a; }

/* Fullscreen TurboWarp iframe */
.fullscreen-iframe { position:fixed; top:0; left:0; width:100vw; height:100vh; background:#121212; z-index:999; display:flex; flex-direction:column; }
.fullscreen-iframe iframe { flex-grow:1; width:100%; height:100%; border:none; }
.back-btn { position:absolute; top:10px; left:10px; padding:8px 14px; border-radius:6px; background:#1d70b8; border:none; color:#fff; cursor:pointer; z-index:1000; transition:background 0.3s; }
.back-btn:hover { background:#155a8a; }
</style>
</head>
<body>
<div class="header">Explore Projects</div>
<div class="projects" id="projectsContainer"></div>

<script>
let exploreData = [];

// Fetch explore projects
async function fetchExploreProjects(){
  const container = document.getElementById('projectsContainer');
  container.innerHTML = `<p>Loading explore projects...</p>`;
  try{
    const res = await fetch(`https://corsproxy.io/?url=https://api.scratch.mit.edu/explore/projects/`);
    if(!res.ok) throw new Error('Failed to fetch explore projects');
    const data = await res.json();
    exploreData = data;
    container.innerHTML = '';
    renderExploreProjects(data);
  }catch(err){
    container.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
  }
}

function renderExploreProjects(data){
  const container = document.getElementById('projectsContainer');
  data.forEach(p => {
    const projDiv = document.createElement('div');
    projDiv.className = 'project';
    projDiv.innerHTML = `
      <img src="${p.images?.['200x200'] || p.image}" alt="${p.title}" onclick="showProjectActions(${p.id})">
      <div class="project-name">${p.title}</div>
      <div class="creator">
        <img src="${p.author.profile.images['32x32']}" alt="${p.author.username}" onclick="openProfile('${p.author.username}')">
        <span>${p.author.username}</span>
      </div>
    `;
    container.appendChild(projDiv);
  });
}

// Show action overlay
function showProjectActions(projectId){
  const overlay = document.createElement('div');
  overlay.className = 'action-overlay';
  overlay.innerHTML = `
    <div class="action-content">
      <div class="logo">
        <img src="https://store-images.s-microsoft.com/image/apps.49046.14590360557032091.5972da3f-cebc-43e1-ab2f-7f8dc310fc45.9da6ae81-6d83-49f9-8533-89672c507050" alt="TurboWarp">
        <button id="runTurbowarp">Run Here With TurboWarp</button>
      </div>
      <div class="logo">
        <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="white" d="M11.406 11.312c-.78-.123-1.198-.654-.99-2.295l.023-.198c.175-1.426.321-1.743.996-1.706.198.013.426.14.654.33.211.247.68.568.945 1.204.19.466.254.77.281 1.098l.042.402v-.002a.68.68 0 0 0 1.342-.007c.008-.044.176-4.365.176-4.436 0-.38-.302-.69-.68-.696a.685.685 0 0 0-.682.688c0 .009-.001.605-.014 1.206-.536-.592-1.223-1.123-1.994-1.17-2.058-.11-2.283 1.811-2.419 2.918l-.02.196c-.278 2.189.441 3.569 2.13 3.837 1.838.293 3.063.72 3.074 1.868.007.446-.224.903-.627 1.254a2.163 2.163 0 0 1-1.749.507 3.233 3.233 0 0 1-.539-.141c-.24-.136-.847-.51-1.154-.942-.26-.364-.35-.937-.378-1.3.004-.163.005-.27.005-.283a.69.69 0 0 0-.669-.703.689.689 0 0 0-.696.682c0 .013-.017 1.367-.066 2.183-.07 1.313 0 2.426 0 2.474.028.382.35.67.727.644a.681.681 0 0 0 .635-.733c0-.006-.033-.545-.029-1.29a5.21 5.21 0 0 0 1.938.773 3.451 3.451 0 0 0 2.856-.82c.713-.619 1.122-1.464 1.11-2.32-.024-2.555-2.865-3.004-4.228-3.222M14.174 0a5.51 5.51 0 0 0-2.724.723h-.112c-2.637 0-4.937 1.392-6.15 3.728-.728 1.393-.9 2.75-.999 3.579-.012.089-.018.17-.028.262-.12.974-.123 1.904-.01 2.772a5.824 5.824 0 0 0-.625 2.529v.016a58.919 58.919 0 0 1-.057 1.95 29.72 29.72 0 0 0-.008 2.94l.013.209C3.698 21.676 6.159 24 9.083 24a5.516 5.516 0 0 0 3.463-1.21 8.357 8.357 0 0 0 5.195-2.08c1.826-1.587 2.859-3.845 2.83-6.19-.013-1.362-.346-2.638-.978-3.763.117-1.273.221-4.996.221-5.03 0-3.103-2.484-5.67-5.539-5.727zm.056 2.675c1.642.03 2.978 1.412 2.978 3.081 0 .038-.145 4.497-.215 4.883a3.152 3.152 0 0 1-.203.69c.756.89 1.165 2 1.175 3.256.021 1.555-.681 3.076-1.926 4.16a5.763 5.763 0 0 1-3.8 1.444 5.986 5.986 0 0 1-.718-.048 3.386 3.386 0 0 1-.172.215 2.97 2.97 0 0 1-2.264 1.038c-1.573 0-2.897-1.255-3.013-2.856l-.008-.122a27.366 27.366 0 0 1 .005-2.662c.039-.679.06-1.831.062-2.08a3.124 3.124 0 0 1 .783-2.025c-.237-.835-.312-1.836-.167-3.02l.024-.212c.083-.695.208-1.72.72-2.7.765-1.473 2.168-2.318 3.848-2.318a4.568 4.568 0 0 1 .824.07c.546-.5 1.27-.81 2.067-.794Z"/>
        </svg>
        <button id="openScratch">Open in Scratch</button>
      </div>
    </div>
    <button class="cancel-btn" id="cancelBtn">Cancel</button>
  `;
  document.body.appendChild(overlay);

  document.getElementById('cancelBtn').onclick = () => overlay.remove();
  document.getElementById('runTurbowarp').onclick = () => runProject(projectId, overlay);
  document.getElementById('openScratch').onclick = () => openInScratch(projectId);
}

// Run TurboWarp fullscreen
function runProject(projectId, overlay){
  overlay.remove();
  const iframeDiv = document.createElement('div');
  iframeDiv.className = 'fullscreen-iframe';
  iframeDiv.innerHTML = `
    <button class="back-btn">Back</button>
    <iframe src="https://turbowarp.org/${projectId}/embed?addons=pause"></iframe>
  `;
  document.body.appendChild(iframeDiv);
  iframeDiv.querySelector('.back-btn').onclick = () => iframeDiv.remove();
}

// Open Scratch project
function openInScratch(projectId){
  window.open(`https://scratch.mit.edu/projects/${projectId}`, '_blank');
}

// Open profile in iframe
function openProfile(username){
  const iframeDiv = document.createElement('div');
  iframeDiv.className = 'fullscreen-iframe';
  iframeDiv.innerHTML = `
    <button class="back-btn">Back</button>
    <iframe src="https://noahscratch493.github.io/ScratchFrame/profile/?username=${username}"></iframe>
  `;
  document.body.appendChild(iframeDiv);
  iframeDiv.querySelector('.back-btn').onclick = () => iframeDiv.remove();
}

// Initial fetch
fetchExploreProjects();
</script>
</body>
</html>
